name: Nix builds

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: NixOS/nix-installer-action@main

      - uses: Mic92/niks3-action@v1
        with:
          server-url: https://niks3.fu.io

      - name: Nix Build
        run: |
          nix build 

